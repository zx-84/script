<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fenêtres</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .box {
      flex: 1 1 300px;
      background-color: #111;
      border: 1px solid #333;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(255,255,255,0.1);
      position: relative;
    }

    h2 {
      margin-top: 0;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background-color: #333;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #555;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="box">
      <h2>Titre 1</h2>
      <p class="content">Voici du texte dans la première fenêtre.</p>
      <button onclick="copyText(this)">Copier</button>
    </div>

    <div class="box">
      <h2>Titre 2</h2>
      <p class="content">Voici du texte dans la deuxième fenêtre.</p>
      <button onclick="copyText(this)">Copier</button>
    </div>

    <div class="box">
      <h2>Titre 3</h2>
      <p class="content">Encore du contenu ici.</p>
      <button onclick="copyText(this)">Copier</button>
    </div>

    <div class="box">
      <h2>Titre 3</h2>
      <p class="content">Encore du contenu ici.</p>
      <button onclick="copyText(this)">Copier</button>
    </div>

    <div class="box">
      <h2>Titre 3</h2>
      <p class="content">Encore du contenu ici.</p>
      <button onclick="copyText(this)">Copier</button>
    </div>

    <div class="box">
      <h2>Titre 3</h2>
      <p class="content">Encore du contenu ici.</p>
      <button onclick="copyText(this)">Copier</button>
    </div>

    <div class="box">
      <h2>Titre 3</h2>
      <p class="content">Encore du contenu ici.</p>
      <button onclick="copyText(this)">Copier</button>
    </div>

  </div>

  <script>
    function copyText(button) {
      const box = button.parentElement;
      const text = box.querySelector(".content").innerText;

      navigator.clipboard.writeText(text).then(() => {
        button.innerText = "Copié !";
        setTimeout(() => {
          button.innerText = "Copier";
        }, 1500);
      });
    }
  </script>

</body>
</html>
